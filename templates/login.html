<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTree — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --male: linear-gradient(135deg, #2c3e7a, #4a6fa5);
            --bg:   #f0eef8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(44,32,64,0.13);
            padding: 48px 44px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .tree-icon { font-size: 40px; margin-bottom: 12px; display: block; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: #2c2040;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #9a8faa;
            font-weight: 300;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 18px; text-align: left; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            letter-spacing: .8px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ede9f5;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            color: #2c2040;
            transition: border-color .2s;
            outline: none;
        }
        input:focus { border-color: #4a6fa5; }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 9px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: left;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: 6px;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }
        .btn-primary { background: var(--male); color: white; }

        .register-link {
            margin-top: 24px;
            font-size: 13px;
            color: #9a8faa;
        }
        .register-link a {
            color: #4a6fa5;
            font-weight: 700;
            text-decoration: none;
        }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <span class="tree-icon">🌳</span>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to view your family tree.</p>

    {% if error %}
        <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Your username"
                   autofocus autocomplete="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Your password"
                   autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <p class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">Create or Join a Family</a>
    </p>
</div>
</body>
</html>
