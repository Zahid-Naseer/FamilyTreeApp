<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-control:hover {
            border-color: #667eea;
        }

        .alert {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .alert-danger {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card-wrapper">
    <h2>Add Marriage</h2>

    {% if success %}
        <div class="alert alert-success">✅ Marriage recorded successfully!</div>
    {% endif %}
    {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'addRelationship' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="spouse1">Husband (Male)</label>
            <select id="spouse1" name="spouse1" class="form-control" required>
                <option value="">Select Husband</option>
                {% for person in males %}
                    <option value="{{ person.id }}">{{ person.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="spouse2">Wife (Female)</label>
            <select id="spouse2" name="spouse2" class="form-control" required>
                <option value="">Select Wife</option>
                {% for person in females %}
                    <option value="{{ person.id }}">{{ person.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="marriage_date">Marriage Date</label>
            <input type="date" id="marriage_date" name="marriage_date">
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-primary">Save Marriage</button>
            <a href="{% url 'addRelationship' %}" class="btn btn-secondary">Cancel</a>
            <a href="{% url 'treeView' %}" class="btn btn-primary">Tree View</a>
            <a href="{% url 'base' %}" class="btn btn-secondary">Back to Home</a>
            
        </div>
    </form>
</div>
    </div>
</body>
</html>
