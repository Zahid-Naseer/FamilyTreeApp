<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Claim Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:#f0eef8; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
        .card { background:white; border-radius:20px; box-shadow:0 8px 40px rgba(44,32,64,0.13); padding:48px 44px; max-width:460px; width:100%; text-align:center; }
        h2 { font-family:'Playfair Display',serif; font-size:1.6rem; color:#2c2040; margin-bottom:12px; }
        p { color:#666; font-size:14px; line-height:1.6; margin-bottom:24px; }
        .name { font-weight:700; color:#2c3e7a; font-size:1.1rem; }
        .btn { display:inline-block; padding:12px 28px; border-radius:8px; font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; text-decoration:none; cursor:pointer; border:none; transition:opacity .2s; margin:6px; }
        .btn-primary { background:linear-gradient(135deg,#2c3e7a,#4a6fa5); color:white; }
        .btn-outline { background:white; color:#4a6fa5; border:2px solid #4a6fa5; }
        .btn:hover { opacity:.85; }
        .warning { background:#fef9ec; border:1px solid #fcd34d; color:#92400e; padding:14px 18px; border-radius:10px; font-size:13px; margin-bottom:24px; text-align:left; }
    </style>
</head>
<body>
<div class="card">
    <div style="font-size:48px; margin-bottom:16px;">🙋</div>
    <h2>Claim Your Profile</h2>
    <p>You are about to claim <span class="name">{{ person.name }}</span> as your own profile.</p>
    <div class="warning">
        ⚠️ Once claimed, only you can edit this profile. Even the family admin will not be able to modify it.
    </div>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Yes, This Is Me</button>
        <a href="{% url 'person_detail' person.pk %}" class="btn btn-outline">Cancel</a>
    </form>
</div>
</body>
</html>
