<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTree — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --male:   linear-gradient(135deg, #2c3e7a, #4a6fa5);
            --bg:     #f0eef8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(44,32,64,0.13);
            padding: 48px 44px;
            max-width: 460px;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            font-size: 12px;
            color: #9a8faa;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }
        .back-link:hover { color: #4a6fa5; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: #2c2040;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #9a8faa;
            font-weight: 300;
            margin-bottom: 32px;
        }

        /* Tab switcher */
        .tabs {
            display: flex;
            background: #f0eef8;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
            color: #9a8faa;
            transition: all .2s;
        }
        .tab.active {
            background: white;
            color: #2c3e7a;
            box-shadow: 0 2px 8px rgba(44,32,64,0.10);
        }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            letter-spacing: .8px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ede9f5;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            color: #2c2040;
            transition: border-color .2s;
            outline: none;
        }
        input:focus { border-color: #4a6fa5; }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 9px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: 4px;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }
        .btn-primary { background: var(--male); color: white; }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #9a8faa;
        }
        .login-link a {
            color: #4a6fa5;
            font-weight: 700;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }

        .hint {
            font-size: 12px;
            color: #b0a8c0;
            margin-top: 6px;
            font-weight: 300;
        }
    </style>
</head>
<body>
<div class="card">
    <a href="{% url 'landing' %}" class="back-link">← Back</a>

    <h1>Create Account</h1>
    <p class="subtitle">Join your family tree or start a new one.</p>

    {% if error %}
        <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <!-- Tab switcher -->
    <div class="tabs">
        <button class="tab {% if action != 'join' %}active{% endif %}"
                onclick="switchTab('create')">🏠 Create Family</button>
        <button class="tab {% if action == 'join' %}active{% endif %}"
                onclick="switchTab('join')">🔗 Join Family</button>
    </div>

    <!-- CREATE FAMILY FORM -->
    <div class="form-section {% if action != 'join' %}active{% endif %}" id="create-form">
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="create">

            <div class="form-group">
                <label>Family Name</label>
                <input type="text" name="family_name" placeholder="e.g. The Khan Family" required>
            </div>
            <div class="form-group">
                <label>Your Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>

            <button type="submit" class="btn btn-primary">Create Family & Register</button>
        </form>
        <p class="hint" style="margin-top:12px;">You'll receive an invite code to share with your family members.</p>
    </div>

    <!-- JOIN FAMILY FORM -->
    <div class="form-section {% if action == 'join' %}active{% endif %}" id="join-form">
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="join">

            <div class="form-group">
                <label>Invite Code</label>
                <input type="text" name="invite_code" placeholder="e.g. XK7T2QPW"
                       style="text-transform:uppercase; letter-spacing:3px;"
                       maxlength="8" required>
                <p class="hint">Ask your family admin for the invite code.</p>
            </div>
            <div class="form-group">
                <label>Your Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>

            <button type="submit" class="btn btn-primary">Join Family & Register</button>
        </form>
    </div>

    <p class="login-link">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'create' && i === 0) || (tab === 'join' && i === 1));
        });
        document.getElementById('create-form').classList.toggle('active', tab === 'create');
        document.getElementById('join-form').classList.toggle('active',   tab === 'join');
    }

    // Auto-switch tab based on URL param
    const params = new URLSearchParams(window.location.search);
    if (params.get('action') === 'join') switchTab('join');
</script>
</body>
</html>
