<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTree — Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --male:   linear-gradient(135deg, #2c3e7a, #4a6fa5);
            --female: linear-gradient(135deg, #7a2c5a, #c06090);
            --bg:     #f0eef8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(44,32,64,0.13);
            padding: 56px 48px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .tree-icon {
            font-size: 52px;
            margin-bottom: 16px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #2c2040;
            margin-bottom: 10px;
        }

        .tagline {
            color: #9a8faa;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: #ede9f5;
            margin-bottom: 36px;
        }

        .option {
            border: 2px solid #ede9f5;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: left;
            transition: border-color .2s, box-shadow .2s;
        }
        .option:hover {
            border-color: #a0a8e0;
            box-shadow: 0 4px 16px rgba(100,100,200,0.1);
        }

        .option h3 {
            font-size: 15px;
            color: #2c2040;
            margin-bottom: 4px;
        }

        .option p {
            font-size: 12px;
            color: #9a8faa;
            margin-bottom: 16px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 11px 28px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity .2s, transform .15s;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }

        .btn-primary { background: var(--male); color: white; }
        .btn-outline {
            background: transparent;
            color: #4a6fa5;
            border: 2px solid #4a6fa5;
        }

        .login-link {
            margin-top: 28px;
            font-size: 13px;
            color: #9a8faa;
        }
        .login-link a {
            color: #4a6fa5;
            font-weight: 700;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <span class="tree-icon">🌳</span>
    <h1>FamilyTree</h1>
    <p class="tagline">Preserve your lineage forever</p>
    <div class="divider"></div>

    <div class="option">
        <h3>🏠 Create a New Family</h3>
        <p>Start your own family tree. You'll get an invite code to share with relatives.</p>
        <a href="{% url 'register' %}?action=create" class="btn btn-primary">Create Family</a>
    </div>

    <div class="option">
        <h3>🔗 Join an Existing Family</h3>
        <p>Have an invite code from a family member? Join their tree.</p>
        <a href="{% url 'register' %}?action=join" class="btn btn-outline">Join Family</a>
    </div>

    <p class="login-link">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
</div>
</body>
</html>
